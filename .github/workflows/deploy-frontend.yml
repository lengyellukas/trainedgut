name: Deploy frontend store

on:
  push:
    branches: [main]
    paths:
      - 'frontend-store/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: PROD

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-store/package-lock.json

      - name: Install dependencies
        working-directory: frontend-store
        run: npm ci

      - name: Build
        working-directory: frontend-store
        run: npm run build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          remote_path: ${{ secrets.SFTP_TARGET_DIR }}
          local_path: frontend-store/dist/*
          sftp_only: true
